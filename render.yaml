# render.yaml — Render.com Deployment Config (Free tier)
services:
  - type: web
    name: cyber-threat-api
    env: python
    region: oregon
    plan: free
    buildCommand: >
      pip install --upgrade pip &&
      pip install --only-binary=:all: -r requirements.txt ||
      pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        value: sqlite:///./data/threat_db.sqlite
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
