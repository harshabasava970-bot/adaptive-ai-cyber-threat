# =============================================================================
# model_config.yaml — ML/DL Model Hyperparameters
# Adaptive AI for Cyber Threat Detection
# These are the research-validated default hyperparameters.
# Hyperparameter tuning results will override these during training.
# =============================================================================

# ---------------------------------------------------------------------------
# Module 6: Phishing Email Detection
# ---------------------------------------------------------------------------
phishing:
  # DistilBERT (primary model — faster inference)
  distilbert:
    model_name: "distilbert-base-uncased"
    max_length: 256
    num_labels: 2
    batch_size: 16
    learning_rate: 2.0e-5
    epochs: 3
    warmup_steps: 500
    weight_decay: 0.01
    dropout: 0.1
    save_path: "data/models/phishing_distilbert"

  # BERT (comparison model — higher accuracy)
  bert:
    model_name: "bert-base-uncased"
    max_length: 256
    num_labels: 2
    batch_size: 8
    learning_rate: 2.0e-5
    epochs: 3
    warmup_steps: 500
    weight_decay: 0.01
    dropout: 0.1
    save_path: "data/models/phishing_bert"

  # Classical ML baselines
  random_forest:
    n_estimators: 200
    max_depth: 20
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1
    class_weight: "balanced"

  logistic_regression:
    C: 1.0
    max_iter: 1000
    solver: "lbfgs"
    class_weight: "balanced"
    random_state: 42

# ---------------------------------------------------------------------------
# Module 7: Malicious URL Detection
# ---------------------------------------------------------------------------
malicious_url:
  random_forest:
    n_estimators: 300
    max_depth: 25
    min_samples_split: 4
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1
    class_weight: "balanced"

  xgboost:
    n_estimators: 300
    max_depth: 8
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0
    scale_pos_weight: 1
    use_label_encoder: false
    eval_metric: "logloss"
    random_state: 42
    n_jobs: -1

  logistic_regression:
    C: 0.5
    max_iter: 1000
    solver: "saga"
    penalty: "l2"
    class_weight: "balanced"
    random_state: 42

# ---------------------------------------------------------------------------
# Module 8: Suspicious Login Behaviour
# ---------------------------------------------------------------------------
login_behaviour:
  isolation_forest:
    n_estimators: 200
    contamination: 0.1
    max_samples: "auto"
    random_state: 42
    n_jobs: -1

  logistic_regression:
    C: 1.0
    max_iter: 500
    solver: "lbfgs"
    class_weight: "balanced"
    random_state: 42

  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.85
    colsample_bytree: 0.85
    random_state: 42
    n_jobs: -1

# ---------------------------------------------------------------------------
# Module 9: Network Anomaly Detection
# ---------------------------------------------------------------------------
network_anomaly:
  isolation_forest:
    n_estimators: 300
    contamination: 0.05
    max_samples: 256
    random_state: 42
    n_jobs: -1

  xgboost:
    n_estimators: 400
    max_depth: 10
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
    n_jobs: -1

  random_forest:
    n_estimators: 300
    max_depth: None
    min_samples_split: 2
    min_samples_leaf: 1
    random_state: 42
    n_jobs: -1
    class_weight: "balanced"

# ---------------------------------------------------------------------------
# Cross-Validation & Evaluation
# ---------------------------------------------------------------------------
evaluation:
  cv_folds: 5
  cv_strategy: "stratified"
  test_size: 0.20
  val_size: 0.10
  random_state: 42
  scoring_metrics:
    - "accuracy"
    - "precision_weighted"
    - "recall_weighted"
    - "f1_weighted"
    - "roc_auc"

# ---------------------------------------------------------------------------
# Explainability
# ---------------------------------------------------------------------------
explainability:
  shap:
    max_display: 20
    plot_type: "bar"
    background_samples: 100
  lime:
    num_features: 15
    num_samples: 5000
    kernel_width: 0.25
